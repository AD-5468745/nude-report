name: nudeTV-company-report

# 업체별 리포트 + 전체 업체 스포일러
# 발송 시각은 외부 크론(cron-job.org)이 정확히 트리거함. (GitHub 자체 예약은 중복 방지 위해 제거)
on:
  workflow_dispatch: {}   # 외부 크론 / 시트 메뉴 / 수동 실행

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 한글 폰트 설치 (CDN 실패 대비 보험)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 업체별 리포트 생성 · 발송
        env:
          SHEET_ID:      ${{ secrets.SHEET_ID }}
          GID_RECORDS:   ${{ secrets.GID_RECORDS }}
          GID_COMPANIES: ${{ secrets.GID_COMPANIES }}
          GID_TEXTS:     ${{ secrets.GID_TEXTS }}
          BOT_TOKEN:     ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:    ${{ secrets.CHANNEL_ID }}
        run: python generate_and_send.py day
